apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: cluster-luqo
  region: us-east-1
  version: "1.35"

iam:
  serviceRoleARN: arn:aws:iam::381491960576:role/LabRole

managedNodeGroups:
  - name: ng-1
    instanceType: t3.large
    desiredCapacity: 3
    minSize: 2
    maxSize: 4
    volumeSize: 20

    iam:
      instanceRoleARN: arn:aws:iam::381491960576:role/LabRole
    tags:
      Project: luqo
      Environment: production

addons:
  - name: vpc-cni
    version: latest
  - name: coredns
    version: latest
  - name: kube-proxy
    version: latest