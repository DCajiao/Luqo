apiVersion: apps/v1
kind: Deployment
metadata:
  name: database
  namespace: luqo
spec:
  replicas: 1   # solo 1 réplica para DB con estado
  selector:
    matchLabels:
      app: database
  template:
    metadata:
      labels:
        app: database
    spec:
      containers:
      - name: database
        image: 381491960576.dkr.ecr.us-east-1.amazonaws.com/luqo-database
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_DB
          value: "luqo_db"
        - name: POSTGRES_USER
          value: "luqo"
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: luqo-secrets
              key: POSTGRES_PASSWORD
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
      volumes:
      - name: postgres-storage
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: database-service
  namespace: luqo
spec:
  selector:
    app: database
  ports:
  - port: 5432
    targetPort: 5432
  type: ClusterIP