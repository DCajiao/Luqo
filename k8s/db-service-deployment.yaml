apiVersion: apps/v1
kind: Deployment
metadata:
  name: db-service
  namespace: luqo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: db-service
  template:
    metadata:
      labels:
        app: db-service
    spec:
      containers:
      - name: db-service
        image: 381491960576.dkr.ecr.us-east-1.amazonaws.com/luqo-db-service
        ports:
        - containerPort: 3001
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: luqo-secrets
              key: DATABASE_URL
        - name: PORT
          value: "3001"
---
apiVersion: v1
kind: Service
metadata:
  name: db-service-svc
  namespace: luqo
spec:
  selector:
    app: db-service
  ports:
  - port: 3001
    targetPort: 3001
  type: ClusterIP